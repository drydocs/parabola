version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    commit-message:
      prefix: chore(deps)
    labels:
      - dependencies
    ignore:
      # Major bumps to these change transaction construction and signing
      # behavior directly -- review and bump by hand, don't auto-merge.
      - dependency-name: "@stellar/stellar-sdk"
        update-types: ["version-update:semver-major"]
      - dependency-name: "viem"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    commit-message:
      prefix: chore(ci)
    labels:
      - dependencies
      - ci
