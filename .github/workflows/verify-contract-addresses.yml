name: Verify Contract Addresses

on:
  pull_request:
    paths:
      - src/constants.ts

jobs:
  verify:
    name: Confirm addresses are live on-chain
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Verify every address in src/constants.ts has live on-chain code
        run: pnpm verify:addresses
